<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NutriSense AI - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface": "#181d19",
                      "surface-container-highest": "#e0e3de",
                      "secondary-fixed": "#ffdad2",
                      "surface-bright": "#f7faf5",
                      "on-surface-variant": "#3f4942",

                      "on-primary-fixed-variant": "#005232",
                      "surface-container-high": "#e6e9e4",
                      "primary-fixed": "#a7f3c5",
                      "on-tertiary-container": "#ffcccd",
                      "surface-container": "#ecefe9",
                      "error": "#ba1a1a",
                      "on-secondary-fixed": "#3c0700",
                      "outline": "#707a71",
                      "error-container": "#ffdad6",
                      "outline-variant": "#bfc9c0",
                      "on-primary": "#ffffff",
                      "background": "#f7faf5",
                      "primary": "#005232",
                      "surface-tint": "#1e6b47",
                      "primary-fixed-dim": "#8bd6aa",
                      "on-tertiary": "#ffffff",
                      "inverse-surface": "#2d312e",
                      "on-tertiary-fixed": "#3c060e",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-background": "#181d19",
                      "surface-variant": "#e0e3de",
                      "on-secondary-container": "#661300",
                      "primary-container": "#1e6b47",
                      "secondary-container": "#ff6e49",
                      "surface-dim": "#d8dbd6",
                      "secondary": "#ad3313",
                      "tertiary-container": "#92484c",
                      "on-primary-container": "#9de9bb",
                      "inverse-primary": "#8bd6aa",
                      "tertiary-fixed": "#ffdada",
                      "on-primary-fixed": "#002111",
                      "on-secondary-fixed-variant": "#891d00",
                      "secondary-fixed-dim": "#ffb4a2",
                      "inverse-on-surface": "#eef2ec",
                      "on-error": "#ffffff",
                      "tertiary-fixed-dim": "#ffb3b4",
                      "on-tertiary-fixed-variant": "#753136",
                      "surface": "#f7faf5"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "xs": "4px",
                      "margin": "24px",
                      "xl": "32px",
                      "lg": "24px",
                      "sm": "8px",
                      "base": "4px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "body-base": [
                              "Inter"
                      ],
                      "label-caps": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Inter"
                      ],
                      "body-sm": [
                              "Inter"
                      ],
                      "button": [
                              "Inter"
                      ],
                      "display-lg": [
                              "Inter"
                      ],
                      "title-sm": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "body-base": [
                              "16px",

                                      "lineHeight": "24px",

                      ],
                      "label-caps": [
                              "12px",

                      "headline-md": [

                      "button": [

                                      "fontWeight": "600"
                              }
                      ],
                      "display-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"

                      ],
                      "title-sm": [
                              "18px",

                                      "lineHeight": "24px",
                                      "fontWeight": "600"

                      ]
              }

          },
        }
      </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-base">
<!-- Header Section -->
<header class="w-full flex justify-between items-center py-sm px-gutter border-b border-surface-variant bg-surface-container-lowest">
<div class="flex items-center gap-xs">
<span class="font-display-lg text-primary text-xl">NutriSense AI</span>
</div>
<button class="font-button text-button text-outline hover:text-on-surface transition-colors duration-200">
            Skip
        </button>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center p-gutter relative w-full max-w-[680px] mx-auto">
<!-- Progress Bar Container -->
<div class="w-full mb-lg">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-caps text-label-caps text-outline">Step 1 of 5</span>
<span class="font-label-caps text-label-caps text-primary">20%</span>
</div>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full" style="width: 20%;"></div>
</div>
</div>
<!-- Wizard Card -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-sm w-full p-lg flex flex-col gap-lg">
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">What's your health goal?</h1>
<p class="font-body-base text-body-base text-outline">Select the primary focus for your nutrition plan.</p>
</div>
<!-- Goal Selection Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-md">
<!-- Card 1: Lose weight (Selected State) -->
<button class="flex flex-col items-center justify-center p-md border-2 border-primary-container bg-surface-container-low rounded-lg transition-all duration-200 hover:shadow-md group relative">
<span class="material-symbols-outlined text-4xl text-primary-container mb-sm" style="font-variation-settings: 'FILL' 1;">monitor_weight</span>
<span class="font-title-sm text-title-sm text-on-surface">Lose weight</span>
<div class="absolute top-sm right-sm text-primary-container">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 2: Build muscle -->
<button class="flex flex-col items-center justify-center p-md border border-surface-variant bg-surface-container-lowest rounded-lg transition-all duration-200 hover:border-outline hover:bg-surface-bright group">
<span class="material-symbols-outlined text-4xl text-outline mb-sm group-hover:text-on-surface">fitness_center</span>
<span class="font-title-sm text-title-sm text-on-surface">Build muscle</span>
</button>
<!-- Card 3: Manage diabetes -->
<button class="flex flex-col items-center justify-center p-md border border-surface-variant bg-surface-container-lowest rounded-lg transition-all duration-200 hover:border-outline hover:bg-surface-bright group">
<span class="material-symbols-outlined text-4xl text-outline mb-sm group-hover:text-on-surface">medical_services</span>
<span class="font-title-sm text-title-sm text-on-surface">Manage diabetes</span>
</button>
<!-- Card 4: Improve energy -->
<button class="flex flex-col items-center justify-center p-md border border-surface-variant bg-surface-container-lowest rounded-lg transition-all duration-200 hover:border-outline hover:bg-surface-bright group sm:col-span-1 lg:col-span-1">
<span class="material-symbols-outlined text-4xl text-outline mb-sm group-hover:text-on-surface">bolt</span>
<span class="font-title-sm text-title-sm text-on-surface">Improve energy</span>
</button>
<!-- Card 5: Eat cleaner -->
<button class="flex flex-col items-center justify-center p-md border border-surface-variant bg-surface-container-lowest rounded-lg transition-all duration-200 hover:border-outline hover:bg-surface-bright group sm:col-span-2 lg:col-span-1">
<span class="material-symbols-outlined text-4xl text-outline mb-sm group-hover:text-on-surface">eco</span>
<span class="font-title-sm text-title-sm text-on-surface">Eat cleaner</span>
</button>
</div>
<!-- Navigation Actions -->
<div class="flex justify-between items-center mt-md pt-md border-t border-surface-variant">
<button class="font-button text-button text-outline hover:text-on-surface transition-colors duration-200 px-md py-sm">
                    Back
                </button>
<button class="bg-secondary-container text-on-surface font-button text-button px-lg py-sm rounded-lg hover:bg-secondary transition-colors duration-200">
                    Next
                </button>
</div>
</div>
</main>
</body></html>
